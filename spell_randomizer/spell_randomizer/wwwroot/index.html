<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Sorcerer - Character Selection</title>
    <link rel="stylesheet" href="styles.css?v=1.2">
    <style>
        .selection-container {
            max-width: 600px;
            margin: 50px auto;
            background: #2c2c2c; /* Dark background for container */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
        }
        hr {
            border: none;
            border-top: 1px solid #444;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="selection-container">
        <h1>Welcome, Sorcerer</h1>
        
        <div class="form-group">
            <h2>Create New Character</h2>
            <input type="text" id="new-character-name" placeholder="Enter character name">
            <button id="create-button">Create & Play</button>
        </div>

        <hr>

        <div class="form-group">
            <h2>Load Existing Character</h2>
            <select id="existing-characters">
                <option value="">Select a character...</option>
            </select>
            <button id="load-button">Load & Play</button>
        </div>
    </div>

    <script src="character-selection.js?v=1.2"></script>
</body>
</html>
